<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30" shape-rendering="geometricPrecision">
  <!-- Navy field -->
  <rect width="60" height="30" fill="#012169"/>

  <!-- White saltire of St Andrew -->
  <line x1="0" y1="0" x2="60" y2="30" stroke="#fff" stroke-width="10"/>
  <line x1="60" y1="0" x2="0"  y2="30" stroke="#fff" stroke-width="10"/>

  <!-- Counterchanged red saltire of St Patrick (4 quadrant polygons) -->
  <!-- NW–SE diagonal, upper-left quadrant: red on upper side -->
  <polygon points="0,0 8.944,0 27,9.028 27,12 24,12" fill="#C8102E"/>
  <!-- NW–SE diagonal, lower-right quadrant: red on lower side -->
  <polygon points="60,30 51.056,30 33,20.972 33,18 36,18" fill="#C8102E"/>
  <!-- NE–SW diagonal, upper-right quadrant: red on upper side -->
  <polygon points="60,0 51.056,0 33,9.028 33,12 36,12" fill="#C8102E"/>
  <!-- NE–SW diagonal, lower-left quadrant: red on lower side -->
  <polygon points="0,30 8.944,30 27,20.972 27,18 24,18" fill="#C8102E"/>

  <!-- White cross of St George -->
  <rect x="0"  y="12" width="60" height="6" fill="#fff"/>
  <rect x="27" y="0"  width="6" height="30"  fill="#fff"/>

  <!-- Red cross of St George -->
  <rect x="0"    y="13.5" width="60" height="3" fill="#C8102E"/>
  <rect x="28.5" y="0"    width="3"  height="30" fill="#C8102E"/>
</svg>
